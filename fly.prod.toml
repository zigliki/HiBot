# PRODUCTION config for HiBot (app: zigliki-hi-bot).
# NOT the default target. Deploy prod explicitly:
#     fly deploy -c fly.prod.toml
# A bare `fly deploy` uses fly.toml, which is STAGING.

app = 'zigliki-hi-bot'
primary_region = 'yyz'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[experimental]
  auto_rollback = true

[build]
  builder = 'heroku/builder:24'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
