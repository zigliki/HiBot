app_name = "zigliki-hi-bot"
app = "zigliki-hi-bot"
primary_region = "yyz"
kill_signal = "SIGINT"
kill_timeout = "5s"

# HiBot is a Discord bot (outbound gateway connection, no inbound HTTP), so it runs
# as a worker: no [http_service], which means the fly proxy never autostops it.

[build]
  builder = "heroku/builder:24"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
