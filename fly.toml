# HiBot PRODUCTION config (app: zigliki-hi-bot).
# Standard convention: a bare `fly deploy` deploys production.
#
# There is NO separate staging fly app (avoids paying for a second machine).
# For local dev/testing use:  npm run staging
#   -> pauses the prod machine, runs the bot locally against the prod DB,
#      and resumes prod on exit. See scripts/staging.sh.

app = 'zigliki-hi-bot'
primary_region = 'yyz'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[experimental]
  auto_rollback = true

[build]
  builder = 'heroku/builder:24'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
