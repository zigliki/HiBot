# STAGING config for HiBot (app: zigliki-hi-bot-staging).
# This is the DEFAULT deploy target: a bare `fly deploy` deploys STAGING.
# Production is fly.prod.toml -> deploy with:  fly deploy -c fly.prod.toml

app = 'zigliki-hi-bot-staging'
primary_region = 'yyz'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[experimental]
  auto_rollback = true

[build]
  builder = 'heroku/builder:24'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
